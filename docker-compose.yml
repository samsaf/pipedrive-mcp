services:
  pipedrive-mcp:
    build: .
    ports:
      - "${PORT:-8152}:${PORT:-8152}"
    environment:
      - PIPEDRIVE_API_TOKEN=${PIPEDRIVE_API_TOKEN}
      - PIPEDRIVE_COMPANY_DOMAIN=${PIPEDRIVE_COMPANY_DOMAIN}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - TRANSPORT=${TRANSPORT:-sse}
      - PORT=${PORT:-8152}
      - HOST=0.0.0.0
      - CONTAINER_MODE=true
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - VERIFY_SSL=${VERIFY_SSL:-true}
      - PIPEDRIVE_FEATURE_PERSONS=${PIPEDRIVE_FEATURE_PERSONS:-true}
      - PIPEDRIVE_FEATURE_ORGANIZATIONS=${PIPEDRIVE_FEATURE_ORGANIZATIONS:-true}
      - PIPEDRIVE_FEATURE_DEALS=${PIPEDRIVE_FEATURE_DEALS:-true}
      - PIPEDRIVE_FEATURE_LEADS=${PIPEDRIVE_FEATURE_LEADS:-true}
      - PIPEDRIVE_FEATURE_ITEM_SEARCH=${PIPEDRIVE_FEATURE_ITEM_SEARCH:-true}
      - PIPEDRIVE_FEATURE_ACTIVITIES=${PIPEDRIVE_FEATURE_ACTIVITIES:-true}
    restart: unless-stopped
